<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PorchPass Paystring Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1E1E1E;
            color: #CCCCCC;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            background-color: #2A2A2A;
            padding: 20px;
            border-bottom: 1px solid #3D3D3D;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .header-title {
            font-size: 28px;
            font-weight: 600;
            color: #4FC3F7;
            letter-spacing: 1px;
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            background-color: #252525;
            border-bottom: 1px solid #3D3D3D;
        }

        .tab {
            flex: 1;
            padding: 15px 20px;
            cursor: pointer;
            background-color: #252525;
            color: #888888;
            border: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab:hover {
            background-color: #2A2A2A;
            color: #CCCCCC;
        }

        .tab.active {
            color: #4FC3F7;
            border-bottom-color: #F5A623;
            background-color: #2A2A2A;
        }

        /* Main Content Area */
        .content {
            flex: 1;
            overflow: auto;
            display: flex;
        }

        .view {
            display: none;
            width: 100%;
            padding: 20px;
            overflow: auto;
        }

        .view.active {
            display: flex;
            flex-direction: column;
        }

        /* Portfolio Summary View */
        .portfolio-title {
            color: #4FC3F7;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .table-container {
            flex: 1;
            overflow: auto;
            background-color: #252525;
            border: 1px solid #3D3D3D;
            border-radius: 4px;
        }

        .portfolio-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .portfolio-table thead {
            position: sticky;
            top: 0;
            background-color: #2A2A2A;
            border-bottom: 1px solid #3D3D3D;
            z-index: 10;
        }

        .portfolio-table th {
            padding: 12px 8px;
            text-align: left;
            color: #4FC3F7;
            font-weight: 600;
            border-right: 1px solid #3D3D3D;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
        }

        .portfolio-table th:hover {
            background-color: #323232;
        }

        .portfolio-table th.sort-asc::after {
            content: ' ▲';
            color: #F5A623;
        }

        .portfolio-table th.sort-desc::after {
            content: ' ▼';
            color: #F5A623;
        }

        .portfolio-table td {
            padding: 12px 8px;
            border-right: 1px solid #3D3D3D;
            border-bottom: 1px solid #3D3D3D;
            white-space: nowrap;
        }

        .portfolio-table tbody tr {
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .portfolio-table tbody tr:nth-child(odd) {
            background-color: #252525;
        }

        .portfolio-table tbody tr:nth-child(even) {
            background-color: #2A2A2A;
        }

        .portfolio-table tbody tr:hover {
            background-color: #303030;
        }

        .status-cell {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: 600;
            font-size: 11px;
            color: #FFF;
        }

        .status-current {
            background-color: #27AE60;
            box-shadow: 0 0 6px rgba(39, 174, 96, 0.4);
        }

        .status-30 {
            background-color: #F5A623;
            box-shadow: 0 0 6px rgba(245, 166, 35, 0.4);
            color: #000;
        }

        .status-60 {
            background-color: #E8703A;
            box-shadow: 0 0 6px rgba(232, 112, 58, 0.4);
        }

        .status-90 {
            background-color: #C0392B;
            box-shadow: 0 0 6px rgba(192, 57, 43, 0.4);
        }

        .status-120 {
            background-color: #8E44AD;
            box-shadow: 0 0 6px rgba(142, 68, 173, 0.4);
        }

        .status-fc {
            background-color: #4A235A;
            box-shadow: 0 0 6px rgba(74, 35, 90, 0.4);
        }

        .status-blank {
            border: 1px solid #3D3D3D;
            background-color: transparent;
            color: #3D3D3D;
        }

        .dpd-cell {
            text-align: center;
            font-weight: 500;
        }

        .dpd-0 {
            color: #27AE60;
        }

        .dpd-1-29 {
            color: #F5A623;
        }

        .dpd-30-59 {
            color: #E8703A;
        }

        .dpd-60-89 {
            color: #C0392B;
        }

        .dpd-90-119 {
            color: #8E44AD;
        }

        .dpd-120 {
            color: #4A235A;
        }

        /* Loan Detail View */
        .loan-detail-header {
            background-color: #2A2A2A;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 4px;
            color: #4FC3F7;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #3D3D3D;
        }

        .loan-detail-content {
            display: flex;
            gap: 30px;
            flex: 1;
            overflow: auto;
            min-height: 0;
        }

        .loan-left-panel {
            flex: 0 0 320px;
            overflow-y: auto;
            min-height: 0;
        }

        .loan-right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: auto;
            min-height: 0;
        }

        .data-section {
            background-color: #252525;
            border: 1px solid #3D3D3D;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .data-section-title {
            color: #4FC3F7;
            font-size: 12px;

            margin-bottom: 12px;

        .data-row {
            display: flex;

        }

        .data-row:last-child {

        .data-label {

        }

        .data-value {

        .paystring-visualization {
            background-color: #252525;
            border: 1px solid #3D3D3D;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: auto;
        }

        .paystring-title {
            color: #F5A623;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .svg-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }

        svg {
            max-width: 100%;
            height: auto;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #3D3D3D;
            justify-content: center;
            font-size: 11px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .paystring-history {
            background-color: #252525;
            border: 1px solid #3D3D3D;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 11px;
        }

        .history-title {
            color: #4FC3F7;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;

        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));

        }

        .history-cell {
            background-color: #2A2A2A;

            text-align: center;

        }

        .back-button {
            background-color: #2A2A2A;
            color: #4FC3F7;
            border: 1px solid #3D3D3D;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;

            margin-bottom: 20px;
        }

        .back-button:hover {
            background-color: #303030;
            border-color: #4FC3F7;
        }

        /* Status Legend Bar */
        .status-legend {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 14px;
            background-color: #252525;
            border: 1px solid #3D3D3D;
            border-radius: 4px;
            margin-bottom: 12px;
            font-size: 11px;
            flex-wrap: wrap;
        }

        .status-legend .legend-label {
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 4px;

        }

        .status-legend .legend-entry {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-legend .legend-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
            color: #FFF;
        }

        .status-legend .legend-text {
            color: #888;
        }

        /* Footer */
        .footer {
            background-color: #2A2A2A;
            padding: 15px 20px;
            border-top: 1px solid #3D3D3D;
            font-size: 11px;
            color: #666666;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .footer-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .pipeline-step {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #252525;
            padding: 6px 12px;
            border-radius: 3px;
            border: 1px solid #3D3D3D;
        }

        .pipeline-icon {
            width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #F5A623;
            color: #000;
            border-radius: 50%;
            font-size: 10px;
            font-weight: bold;
        }

        .pipeline-arrow {
            color: #666666;
            font-size: 12px;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-label {
            color: #666666;
        }

        .stat-value {
            color: #4FC3F7;
            font-weight: 600;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #252525;
        }

        ::-webkit-scrollbar-thumb {
            background: #3D3D3D;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4FC3F7;
        }
    </style>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-title">PorchPass Paystring Report</div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-view="portfolio">PORTFOLIO SUMMARY</button>
            <button class="tab" data-view="detail">LOAN DETAIL</button>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Portfolio Summary View -->
            <div id="portfolio" class="view active">
                <div class="portfolio-title">PORCHPASS — PAYSTRING PORTFOLIO SUMMARY | As of 2026-02-28</div>
                <div class="status-legend">
                    <span class="legend-label">Key:</span>
                    <span class="legend-entry"><span class="legend-dot" style="background:#27AE60;">C</span><span class="legend-text">Current</span></span>
                    <span class="legend-entry"><span class="legend-dot" style="background:#F5A623;color:#000;">30</span><span class="legend-text">30-Day</span></span>
                    <span class="legend-entry"><span class="legend-dot" style="background:#E8703A;">60</span><span class="legend-text">60-Day</span></span>
                    <span class="legend-entry"><span class="legend-dot" style="background:#C0392B;">90</span><span class="legend-text">90-Day</span></span>
                    <span class="legend-entry"><span class="legend-dot" style="background:#8E44AD;">120+</span><span class="legend-text">120+ Day</span></span>
                    <span class="legend-entry"><span class="legend-dot" style="background:#4A235A;">FC</span><span class="legend-text">FC/REO</span></span>
                    <span class="legend-entry"><span class="legend-dot" style="border:1px solid #3D3D3D;background:transparent;color:#3D3D3D;">—</span><span class="legend-text">Blank</span></span>
                </div>
                <div class="table-container">
                    <table class="portfolio-table" id="portfolioTable">
                        <thead>
                            <tr id="headerRow"></tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Loan Detail View -->
            <div id="detail" class="view">
                <button class="back-button" onclick="showPortfolio()">← Back to Portfolio Summary</button>
                <div class="loan-detail-header" id="detailHeader"></div>
                <div class="loan-detail-content">
                    <div class="loan-left-panel" id="leftPanel"></div>
                    <div class="loan-right-panel">
                        <div class="paystring-visualization" id="paystringViz"></div>
                        <div class="paystring-history" id="historySection"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-line">
                <span class="pipeline-step">
                    <span class="pipeline-icon">1</span>
                    <span>etl_loan_data.py</span>
                </span>
                <span class="pipeline-arrow">→</span>
                <span class="pipeline-step">
                    <span class="pipeline-icon">2</span>
                    <span>paystring_generator.py</span>
                </span>
                <span class="pipeline-arrow">→</span>
                <span class="pipeline-step">
                    <span class="pipeline-icon">3</span>
                    <span>batch_paystring.py</span>
                </span>
            </div>
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-label">Loan-Level Pay String Engine —</span>
                    <span class="stat-value">410 Loans</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">136 Seconds</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">Zero Errors</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============= DATA GENERATION =============
        const states = ['TX', 'FL', 'CA', 'GA', 'OH', 'NC', 'AZ', 'CO', 'WA', 'PA', 'IL', 'NY', 'MI', 'VA', 'MA'];
        const loanIds = [
            'loan_17Hropvm24DY', 'loan_1EADTRYgkDqv', 'loan_2F9KmLpQxW2', 'loan_3J8nNsRtYZ5', 'loan_4K7pVuWxAb6',
            'loan_5L6qXyZ2Cd7', 'loan_6M5rZ1De3Ef8', 'loan_7N4sA2Fg4Gh9', 'loan_8O3tB3Hi5Ij0', 'loan_9P2uC4Jk6Kl1',
            'loan_aqRvD5Lm7Mn2', 'loan_brSwE6No8Op3', 'loan_csUtF7Pq9Qr4', 'loan_dtVuG8Rs0St5', 'loan_euWxH9Tu1Uv6',
            'loan_fvXyI0Vw2Wx7', 'loan_gwYzJ1Xy3Yz8', 'loan_hxZaK2Yz4Za9', 'loan_iyAbL3Zb5Ab0', 'loan_jzBcM4Ac6Bc1'
        ];

        // The 16-month window: Nov 2024 through Feb 2026
        const PAYSTRING_MONTHS = [
            {year:2024, month:11}, {year:2024, month:12},
            {year:2025, month:1},  {year:2025, month:2},  {year:2025, month:3},
            {year:2025, month:4},  {year:2025, month:5},  {year:2025, month:6},
            {year:2025, month:7},  {year:2025, month:8},  {year:2025, month:9},
            {year:2025, month:10}, {year:2025, month:11}, {year:2025, month:12},
            {year:2026, month:1},  {year:2026, month:2}
        ];

        // Deterministic seeded random for consistent demo data across reloads
        let _seed = 42;
        function sRand() { _seed = (_seed * 16807 + 0) % 2147483647; return (_seed - 1) / 2147483646; }

        // Pre-defined loan profiles: [status, fpmMonth, dqStartIndex, description]
        // Spread delinquencies across rows 2-8 so they're visible above the fold
        const LOAN_PROFILES = [
            // Row 0: Performing
            ['Performing', 4, -1],
            // Row 1: 30-day DQ — went late Dec 2025, still 30-day
            ['dq30', 5, 13],
            // Row 2: Performing
            ['Performing', 3, -1],
            // Row 3: 60+ escalating — went 30 in Oct 2025, 60 in Nov, 60 in Dec, 90 Jan, 120+ Feb
            ['dq60+', 4, 11],
            // Row 4: Performing
            ['Performing', 6, -1],
            // Row 5: 30-day — one-time late Aug 2025, cured, then late again Jan 2026
            ['dq30-cured-relapsed', 4, -1],
            // Row 6: Performing
            ['Performing', 5, -1],
            // Row 7: 90-day — started going late Sep 2025
            ['dq90', 3, 10],
            // Row 8: Performing
            ['Performing', 7, -1],
            // Row 9: Performing
            ['Performing', 4, -1],
            // Row 10: 30-day late — recent, only Feb 2026
            ['dq30-recent', 6, 15],
            // Row 11: Performing
            ['Performing', 5, -1],
            // Row 12: Paid Off — paid off after Dec 2025
            ['Paid Off', 3, -1],
            // Row 13: Performing
            ['Performing', 8, -1],
            // Row 14: 60-day — went 30 in Dec 2025, 60 in Jan 2026
            ['dq60', 4, 13],
            // Row 15: Performing
            ['Performing', 5, -1],
            // Row 16: 120+ severe — long delinquency from Jul 2025
            ['dq120+', 4, 8],
            // Row 17: Performing
            ['Performing', 6, -1],
            // Row 18: 30-day — late Nov 2025, cured Dec, late again Feb
            ['dq30-sporadic', 5, -1],
            // Row 19: Performing
            ['Performing', 3, -1],
        ];

        function generateLoans() {
            const loans = [];
            for (let i = 0; i < 20; i++) {
                const state = states[i % states.length];
                const origBalance = 80000 + Math.floor(sRand() * 170000);
                const profile = LOAN_PROFILES[i];
                const profileType = profile[0];
                const fpmMonth = profile[1];
                const dqStart = profile[2];

                // Map profile type to display status
                let displayStatus = 'Performing';
                if (profileType.startsWith('dq30')) displayStatus = 'dq30';
                else if (profileType === 'dq60') displayStatus = 'dq60+';
                else if (profileType === 'dq60+') displayStatus = 'dq60+';
                else if (profileType === 'dq90') displayStatus = 'dq90+';
                else if (profileType === 'dq120+') displayStatus = 'dq120+';
                else if (profileType === 'Paid Off') displayStatus = 'Paid Off';

                const paystring = generatePaystring(profileType, fpmMonth, dqStart);
                const currentUPB = displayStatus === 'Paid Off' ? 0 : origBalance * (0.92 + sRand() * 0.06);

                // Derive DPD from the last paystring status
                const dpdDec25 = getDpdFromStatus(paystring.find(p => p.month === '2025-12')?.status);
                const dpdJan26 = getDpdFromStatus(paystring.find(p => p.month === '2026-01')?.status);
                const dpdFeb26 = getDpdFromStatus(paystring.find(p => p.month === '2026-02')?.status);

                const firstPmtDue = `2024-${String(fpmMonth).padStart(2,'0')}-01`;

                loans.push({
                    id: loanIds[i],
                    state: state,
                    status: displayStatus,
                    intRate: (7.5 + sRand() * 3).toFixed(2),
                    origBalance: origBalance,
                    currentUPB: Math.max(0, currentUPB),
                    monthlyPayment: origBalance / 360,
                    firstPmtDue: firstPmtDue,
                    dpdDec25: dpdDec25,
                    dpdJan26: dpdJan26,
                    dpdFeb26: dpdFeb26,
                    paystring: paystring,
                    midwestLoanNum: `${5001130000 + i * 37}`,
                    madisonAccount: `${2010000 + i * 13}`,
                    closingDate: `2024-${String(Math.max(1, fpmMonth - 2)).padStart(2,'0')}-${String(Math.floor(sRand() * 28) + 1).padStart(2,'0')}`
                });
            }
            return loans;
        }

        function getDpdFromStatus(s) {
            if (!s || s === '' || s === 'C') return 0;
            if (s === '30') return 30;
            if (s === '60') return 61;
            if (s === '90') return 89;
            if (s === '120+') return 143;
            return 0;
        }

        function generatePaystring(profileType, fpmMonth, dqStart) {
            const months = [];

            for (let i = 0; i < 16; i++) {
                const ym = PAYSTRING_MONTHS[i];
                const monthKey = `${ym.year}-${String(ym.month).padStart(2, '0')}`;
                const absMonth = ym.year * 12 + ym.month;
                const absFpm = 2024 * 12 + fpmMonth;

                // Before first payment date → blank
                if (absMonth < absFpm) {
                    months.push({ month: monthKey, status: '' });
                    continue;
                }

                let s = 'C'; // default current

                if (profileType === 'Paid Off') {
                    // Current through Dec 2025, blank after
                    s = (i <= 13) ? 'C' : '';

                } else if (profileType === 'dq30' && dqStart >= 0 && i >= dqStart) {
                    s = '30';

                } else if (profileType === 'dq30-recent' && dqStart >= 0 && i >= dqStart) {
                    s = '30';

                } else if (profileType === 'dq30-cured-relapsed') {
                    // Current, then 30 in Aug 2025 (idx 9), cured Sep-Dec, then 30 again Jan-Feb 2026
                    if (i === 9) s = '30';
                    else if (i >= 14) s = '30';
                    else s = 'C';

                } else if (profileType === 'dq30-sporadic') {
                    // Current, then 30 in Nov 2025 (idx 12), cured Dec (idx 13), 30 again Feb (idx 15)
                    if (i === 12) s = '30';
                    else if (i === 15) s = '30';
                    else s = 'C';

                } else if (profileType === 'dq60' && dqStart >= 0 && i >= dqStart) {
                    const d = i - dqStart;
                    if (d === 0) s = '30';
                    else s = '60';

                } else if (profileType === 'dq60+' && dqStart >= 0 && i >= dqStart) {
                    const d = i - dqStart;
                    if (d === 0) s = '30';
                    else if (d === 1) s = '60';
                    else if (d === 2) s = '60';
                    else if (d === 3) s = '90';
                    else s = '120+';

                } else if (profileType === 'dq90' && dqStart >= 0 && i >= dqStart) {
                    const d = i - dqStart;
                    if (d === 0) s = '30';
                    else if (d === 1) s = '60';
                    else if (d === 2) s = '90';
                    else if (d === 3) s = '90';
                    else s = '120+';

                } else if (profileType === 'dq120+' && dqStart >= 0 && i >= dqStart) {
                    const d = i - dqStart;
                    if (d === 0) s = '30';
                    else if (d === 1) s = '60';
                    else if (d === 2) s = '90';
                    else s = '120+';
                }

                months.push({ month: monthKey, status: s });
            }
            return months;
        }

        const loans = generateLoans();
        let currentLoan = null;

        // ============= TABLE POPULATION =============
        function populatePortfolioTable() {
            const headerRow = document.getElementById('headerRow');
            const tableBody = document.getElementById('tableBody');

            // Generate header
            const headers = [
                'Loan ID', 'State', 'Status', 'Int Rate', 'Orig Balance', 'Curr UPB',
                'Mo. Payment', 'First Pmt Due', 'DPD Dec25', 'DPD Jan26', 'DPD Feb26'
            ];

            // Add paystring headers
            loans[0].paystring.forEach(p => {
                headers.push(p.month);
            });

            headerRow.innerHTML = headers.map((h, idx) => {
                const isSortable = idx < 11;
                return `<th ${isSortable ? `onclick="sortTable(${idx})" class="sortable"` : ''}>${h}</th>`;
            }).join('');

            // Populate rows
            tableBody.innerHTML = loans.map((loan, idx) => {
                let paystringHtml = loan.paystring.map(p => {
                    const statusColor = getStatusColor(p.status);
                    const statusClass = p.status === ' ' ? 'status-blank' : `status-${p.status === 'C' ? 'current' : p.status === '30' ? '30' : p.status === '60' ? '60' : p.status === '90' ? '90' : p.status === '120' ? '120' : p.status === 'PO' ? 'fc' : 'blank'}`;
                    return `<td><div class="status-cell ${statusClass}">${p.status === ' ' ? '' : p.status}</div></td>`;
                }).join('');

                const dpdDec25Class = getDpdClass(loan.dpdDec25);
                const dpdJan26Class = getDpdClass(loan.dpdJan26);
                const dpdFeb26Class = getDpdClass(loan.dpdFeb26);

                return `<tr onclick="viewLoanDetail(${idx})">
                    <td>${loan.id}</td>
                    <td>${loan.state}</td>
                    <td>${loan.status}</td>
                    <td>${loan.intRate}%</td>
                    <td>$${loan.origBalance.toLocaleString()}</td>
                    <td>$${loan.currentUPB.toLocaleString(undefined, {maximumFractionDigits: 0})}</td>
                    <td>$${loan.monthlyPayment.toLocaleString(undefined, {maximumFractionDigits: 2})}</td>
                    <td>${loan.firstPmtDue}</td>
                    <td class="dpd-cell ${dpdDec25Class}">${loan.dpdDec25}</td>
                    <td class="dpd-cell ${dpdJan26Class}">${loan.dpdJan26}</td>
                    <td class="dpd-cell ${dpdFeb26Class}">${loan.dpdFeb26}</td>
                    ${paystringHtml}
                </tr>`;
            }).join('');
        }

        function getDpdClass(dpd) {
            if (dpd === 0) return 'dpd-0';
            if (dpd <= 29) return 'dpd-1-29';
            if (dpd <= 59) return 'dpd-30-59';
            if (dpd <= 89) return 'dpd-60-89';
            if (dpd <= 119) return 'dpd-90-119';
            return 'dpd-120';
        }

        function getStatusColor(status) {
            const colors = {
                'C': '#27AE60',
                '30': '#F5A623',
                '60': '#E8703A',
                '90': '#C0392B',
                '120': '#8E44AD',
                'PO': '#4A235A',
                ' ': '#3D3D3D'
            };
            return colors[status] || '#3D3D3D';
        }

        // ============= VIEW SWITCHING =============
        function viewLoanDetail(loanIdx) {
            currentLoan = loans[loanIdx];
            renderLoanDetail();
            showDetailView();
        }

        function showPortfolio() {
            showView('portfolio');
        }

        function showDetailView() {
            // If no loan selected yet, auto-select the first loan
            if (!currentLoan && loans.length > 0) {
                currentLoan = loans[0];
            }
            if (currentLoan) {
                renderLoanDetail();
            }
            showView('detail');
        }

        function showView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

            document.getElementById(viewName).classList.add('active');
            document.querySelector(`[data-view="${viewName}"]`).classList.add('active');
        }

        // ============= LOAN DETAIL RENDERING =============
        function renderLoanDetail() {
            if (!currentLoan) return;

            const header = document.getElementById('detailHeader');
            header.innerHTML = `LOAN: ${currentLoan.id} | Status: ${currentLoan.status} | State: ${currentLoan.state} | As Of: 2026-02-28`;

            const leftPanel = document.getElementById('leftPanel');
            leftPanel.innerHTML = `
                <div class="data-section">
                    <div class="data-section-title">Loan Information</div>
                    <div class="data-row">
                        <span class="data-label">Loan ID</span>
                        <span class="data-value">${currentLoan.id}</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">Midwest Loan #</span>
                        <span class="data-value">${currentLoan.midwestLoanNum}</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">Madison Account</span>
                        <span class="data-value">${currentLoan.madisonAccount}</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">Closing Date</span>
                        <span class="data-value">${currentLoan.closingDate}</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">First Pmt Due</span>
                        <span class="data-value">${currentLoan.firstPmtDue}</span>
                    </div>
                </div>
                <div class="data-section">
                    <div class="data-section-title">Status & Performance</div>
                    <div class="data-row">
                        <span class="data-label">Loan Status</span>
                        <span class="data-value">${currentLoan.status}</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">Interest Rate</span>
                        <span class="data-value">${currentLoan.intRate}%</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">DPD (Dec 25)</span>
                        <span class="data-value" style="color: ${getDpdColor(currentLoan.dpdDec25)}">${currentLoan.dpdDec25}</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">DPD (Jan 26)</span>
                        <span class="data-value" style="color: ${getDpdColor(currentLoan.dpdJan26)}">${currentLoan.dpdJan26}</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">DPD (Feb 26)</span>
                        <span class="data-value" style="color: ${getDpdColor(currentLoan.dpdFeb26)}">${currentLoan.dpdFeb26}</span>
                    </div>
                </div>
                <div class="data-section">
                    <div class="data-section-title">Balance Information</div>
                    <div class="data-row">
                        <span class="data-label">Orig Balance</span>
                        <span class="data-value">$${currentLoan.origBalance.toLocaleString()}</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">Current UPB</span>
                        <span class="data-value">$${currentLoan.currentUPB.toLocaleString(undefined, {maximumFractionDigits: 0})}</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">Monthly P&I</span>
                        <span class="data-value">$${currentLoan.monthlyPayment.toLocaleString(undefined, {maximumFractionDigits: 2})}</span>
                    </div>
                </div>
                <div class="data-section">
                    <div class="data-section-title">Geography</div>
                    <div class="data-row">
                        <span class="data-label">Borrower State</span>
                        <span class="data-value">${currentLoan.state}</span>
                    </div>
                </div>
            `;

            renderPaystringVisualization();
            renderPaystringHistory();
        }

        function getDpdColor(dpd) {
            if (dpd === 0) return '#27AE60';
            if (dpd <= 29) return '#F5A623';
            if (dpd <= 59) return '#E8703A';
            if (dpd <= 89) return '#C0392B';
            if (dpd <= 119) return '#8E44AD';
            return '#4A235A';
        }

        // ============= PAYSTRING VISUALIZATION =============
        function renderPaystringVisualization() {
            const viz = document.getElementById('paystringViz');

            // Build a lookup: { year: { month(1-12): status } }
            const byYear = {};
            currentLoan.paystring.forEach(p => {
                const [y, m] = p.month.split('-').map(Number);
                if (!byYear[y]) byYear[y] = {};
                byYear[y][m] = p.status;
            });

            // Get unique years sorted newest first (matching real dv01 layout)
            const years = Object.keys(byYear).map(Number).sort((a, b) => b - a);
            const numYears = years.length;

            const svgWidth = 800;
            const dotR = 14;
            const rowHeight = 55;
            const topPad = 55;
            const botPad = 50;
            const leftPad = 70;
            const rightPad = 30;
            const svgHeight = topPad + numYears * rowHeight + botPad;
            const contentWidth = svgWidth - leftPad - rightPad;
            const monthSpacing = contentWidth / 12;
            const quarters = ['Q1', 'Q2', 'Q3', 'Q4'];

            let svg = `<svg width="${svgWidth}" height="${svgHeight}" viewBox="0 0 ${svgWidth} ${svgHeight}">
                <defs>
                    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
                        <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
                    </filter>
                    <radialGradient id="grad-c" cx="35%" cy="35%">
                        <stop offset="0%" stop-color="#3FD871" /><stop offset="100%" stop-color="#27AE60" />
                    </radialGradient>
                    <radialGradient id="grad-30" cx="35%" cy="35%">
                        <stop offset="0%" stop-color="#FFB84D" /><stop offset="100%" stop-color="#F5A623" />
                    </radialGradient>
                    <radialGradient id="grad-60" cx="35%" cy="35%">
                        <stop offset="0%" stop-color="#FF9955" /><stop offset="100%" stop-color="#E8703A" />
                    </radialGradient>
                    <radialGradient id="grad-90" cx="35%" cy="35%">
                        <stop offset="0%" stop-color="#E85545" /><stop offset="100%" stop-color="#C0392B" />
                    </radialGradient>
                    <radialGradient id="grad-120" cx="35%" cy="35%">
                        <stop offset="0%" stop-color="#A855C4" /><stop offset="100%" stop-color="#8E44AD" />
                    </radialGradient>
                </defs>`;

            // Background
            svg += `<rect width="${svgWidth}" height="${svgHeight}" rx="4" fill="#252525"/>`;

            // Title bar
            svg += `<rect x="0" y="0" width="${svgWidth}" height="32" fill="#2A2A2A" rx="4"/>`;
            svg += `<text x="16" y="22" font-family="monospace" font-size="13" font-weight="bold" fill="#FFFFFF">PAYSTRING</text>`;
            svg += `<text x="${svgWidth - 16}" y="22" font-family="monospace" font-size="9" fill="#888888" text-anchor="end">As of: 2026-02-28</text>`;

            // Quarter labels (only once, at top)
            for (let q = 0; q < 4; q++) {
                const qCenterX = leftPad + (q * 3 + 1) * monthSpacing + monthSpacing / 2;
                svg += `<text x="${qCenterX}" y="${topPad - 12}" font-family="monospace" font-size="10" font-weight="bold" fill="#888888" text-anchor="middle">${quarters[q]}</text>`;
            }

            // Quarter divider lines
            for (let q = 1; q < 4; q++) {
                const xDiv = leftPad + q * 3 * monthSpacing;
                svg += `<line x1="${xDiv}" y1="${topPad - 5}" x2="${xDiv}" y2="${topPad + numYears * rowHeight}" stroke="#383838" stroke-width="0.6" opacity="0.9"/>`;
            }

            // Year rows — newest at top
            years.forEach((year, yi) => {
                const rowY = topPad + yi * rowHeight + rowHeight / 2;
                const monthData = byYear[year];

                // Year label in gold
                svg += `<text x="${leftPad - 12}" y="${rowY + 5}" font-family="monospace" font-size="12" font-weight="bold" fill="#F5A623" text-anchor="end">${year}</text>`;

                // Horizontal timeline line
                const firstMo = Math.min(...Object.keys(monthData).map(Number));
                const lastMo = Math.max(...Object.keys(monthData).map(Number));
                const lineX1 = leftPad + (firstMo - 1) * monthSpacing + monthSpacing / 2 - dotR;
                const lineX2 = leftPad + (lastMo - 1) * monthSpacing + monthSpacing / 2 + dotR;
                svg += `<line x1="${lineX1}" y1="${rowY}" x2="${lineX2}" y2="${rowY}" stroke="#4A4A4A" stroke-width="1.5" stroke-linecap="round"/>`;

                // Dots for each month (1-12)
                for (let m = 1; m <= 12; m++) {
                    const cx = leftPad + (m - 1) * monthSpacing + monthSpacing / 2;
                    const status = monthData[m];

                    if (status === undefined) continue; // No data for this month

                    if (!status || status === '' || status === ' ') {
                        // Empty circle for blank/pre-first-payment months
                        svg += `<circle cx="${cx}" cy="${rowY}" r="${dotR * 0.72}" fill="none" stroke="#3D3D3D" stroke-width="1.2"/>`;
                    } else {
                        // Filled status dot with gradient, shadow, and gloss
                        const gradMap = { 'C': 'grad-c', '30': 'grad-30', '60': 'grad-60', '90': 'grad-90', '120+': 'grad-120' };
                        const strokeMap = { 'C': '#1E8449', '30': '#D4881B', '60': '#C85A28', '90': '#922B21', '120+': '#6C3483' };
                        const gradId = gradMap[status] || 'grad-c';
                        const strokeColor = strokeMap[status] || '#1E8449';

                        // Shadow circle
                        svg += `<circle cx="${cx + 1}" cy="${rowY + 1.5}" r="${dotR}" fill="#000" opacity="0.3"/>`;
                        // Main dot
                        svg += `<circle cx="${cx}" cy="${rowY}" r="${dotR}" fill="url(#${gradId})" stroke="${strokeColor}" stroke-width="1.2"/>`;
                        // Inner gloss highlight
                        svg += `<circle cx="${cx - dotR * 0.25}" cy="${rowY - dotR * 0.25}" r="${dotR * 0.35}" fill="white" opacity="0.14"/>`;
                        // Status text
                        const fontSize = status.length > 2 ? '8' : '10';
                        svg += `<text x="${cx}" y="${rowY}" font-family="monospace" font-size="${fontSize}" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">${status}</text>`;
                    }
                }
            });

            // Legend strip at bottom
            const legendY = topPad + numYears * rowHeight + 20;
            const legendItems = [
                { label: 'Current', color: '#27AE60', stroke: '#1E8449' },
                { label: '30 Day', color: '#F5A623', stroke: '#D4881B' },
                { label: '60 Day', color: '#E8703A', stroke: '#C85A28' },
                { label: '90 Day', color: '#C0392B', stroke: '#922B21' },
                { label: '120+', color: '#8E44AD', stroke: '#6C3483' },
                { label: 'FC/REO', color: '#4A235A', stroke: '#311B42' }
            ];
            let lx = leftPad;
            legendItems.forEach(item => {
                svg += `<circle cx="${lx}" cy="${legendY}" r="5" fill="${item.color}" stroke="${item.stroke}" stroke-width="0.8"/>`;
                svg += `<text x="${lx + 10}" y="${legendY + 4}" font-family="monospace" font-size="8" fill="#888888">${item.label}</text>`;
                lx += 100;
            });

            svg += `</svg>`;

            viz.innerHTML = `
                <div class="paystring-title">PAYSTRING | As of: 2026-02-28</div>
                <div class="svg-container">${svg}</div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #27AE60;"></div>
                        <span>Current (C)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #F5A623;"></div>
                        <span>30-Day (30)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #E8703A;"></div>
                        <span>60-Day (60)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #C0392B;"></div>
                        <span>90-Day (90)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #8E44AD;"></div>
                        <span>120+ (120)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background-color: #3D3D3D; border: 1px solid #666666;"></div>
                        <span>Future/Blank</span>
                    </div>
                </div>
            `;
        }

        function renderPaystringHistory() {
            const history = document.getElementById('historySection');
            const statusColors = {
                'C': { bg: '#27AE60', text: '#FFF' },
                '30': { bg: '#F5A623', text: '#FFF' },
                '60': { bg: '#E8703A', text: '#FFF' },
                '90': { bg: '#C0392B', text: '#FFF' },
                '120+': { bg: '#8E44AD', text: '#FFF' },
                '': { bg: '#3D3D3D', text: '#666' }
            };
            const months = currentLoan.paystring.map(p => {
                const sc = statusColors[p.status] || statusColors[''];
                const displayStatus = p.status || '—';
                return `<div class="history-cell" style="display:flex;flex-direction:column;gap:4px;"><span style="color:#888;font-size:10px;">${p.month}</span><span style="background:${sc.bg};color:${sc.text};padding:3px 6px;border-radius:3px;font-weight:700;font-size:11px;">${displayStatus}</span></div>`;
            }).join('');

            history.innerHTML = `
                <div class="history-title">PAYSTRING HISTORY</div>
                <div class="history-grid">${months}</div>
            `;
        }

        // ============= TABLE SORTING =============
        let sortColumn = 0;
        let sortAscending = true;

        function sortTable(colIdx) {
            sortAscending = sortColumn === colIdx ? !sortAscending : true;
            sortColumn = colIdx;

            const headers = document.querySelectorAll('th');
            headers.forEach((h, idx) => {
                h.classList.remove('sort-asc', 'sort-desc');
                if (idx === colIdx) {
                    h.classList.add(sortAscending ? 'sort-asc' : 'sort-desc');
                }
            });

            const sortKeys = ['id', 'state', 'status', 'intRate', 'origBalance', 'currentUPB', 'monthlyPayment', 'firstPmtDue', 'dpdDec25', 'dpdJan26', 'dpdFeb26'];
            loans.sort((a, b) => {
                let aVal = a[sortKeys[colIdx]];
                let bVal = b[sortKeys[colIdx]];

                if (typeof aVal === 'number') {
                    return sortAscending ? aVal - bVal : bVal - aVal;
                }
                return sortAscending ? String(aVal).localeCompare(String(bVal)) : String(bVal).localeCompare(String(aVal));
            });

            populatePortfolioTable();
        }

        // ============= TAB SWITCHING =============
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                const viewName = e.target.dataset.view;
                if (viewName === 'detail') {
                    showDetailView();
                } else {
                    showView(viewName);
                }
            });
        });

        // ============= INITIALIZATION =============
        populatePortfolioTable();
    </script>
</body>
</html>
